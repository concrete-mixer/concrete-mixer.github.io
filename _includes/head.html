<head>
	<meta charset="utf-8">
	<title>
        {% if page.title %}
            {{ page.title }}
        {% else if site.theme.title %}
            {{ site.theme.title }}
        {% endif %}
    </title>
	<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.theme.description }}{% endif %}">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- CSS -->
	<link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">

	<!--Favicon-->
	<link rel="shortcut icon" href="{{ "/favicon.ico" | prepend: site.baseurl }}" type="image/x-icon">

	<!-- Canonical -->
	<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

	<!-- RSS -->
	<link rel="alternate" type="application/atom+xml" title="{{ site.theme.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}" />

	<!-- Font Awesome -->
	<link href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" rel="stylesheet">

	<!-- Google Fonts -->
	{% if site.theme.google_fonts %}
	<link href="//fonts.googleapis.com/css?family={{ site.theme.google_fonts }}" rel="stylesheet" type="text/css">
	{% endif %}

	<!-- KaTeX -->
	{% if site.theme.katex %}
	<link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/KaTeX/0.3.0/katex.min.css">
	<script src="//cdnjs.cloudflare.com/ajax/libs/KaTeX/0.3.0/katex.min.js"></script>
	{% endif %}

	<!-- Google Analytics -->
	{% if site.theme.google_analytics %}
	<script>
	(function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
	(i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
	m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
	})(window,document,'script','//www.google-analytics.com/analytics.js','ga');

	ga('create', '{{ site.theme.google_analytics }}', 'auto');
	ga('send', 'pageview');
	</script>
	{% endif %}

  <script src="https://cdn.jsdelivr.net/sockjs/1/sockjs.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="https://connect.soundcloud.com/sdk/sdk-3.1.2.js"></script>
  <script>
    // heyho, it's jquery
    $(document).ready(function() {
      // do it like this for now
      contributor_sites = {
        'Rob Szeliga': 'http://www.rszoniq.com',
        'Sebastian Brock': 'http://bemtevi.de/',
        'Adrien Capozzi': 'http://www.adrien75.com/adrien75.html'
      }

      // initialise soundcloud client
      SC.initialize({
        client_id: '11bab725274cff587d5908c18cd501c2'
      });

      // kick off sockJS connection
      var sock = new SockJS('http://concrete-mixer.venturus.io/cm-data');
      sock.onopen = function() {
        console.log('WS connection open');
      };

      sock.onmessage = function(e) {
        var data = JSON.parse(e.data)
        var id = '#stream' + data.stream
        var $el = $(id)

        if ( $el ) {
          $('.call-out').addClass('now-playing')

          $('#nowPlaying').fadeIn(500, function() {
            $el.fadeOut(500, function() {
              var contributorName = data.recordist

              if ( contributor_sites[data.recordist] !== undefined ) {
                contributorName = '<a href="'
                  + contributor_sites[data.recordist]
                  + '">' + data.recordist + '</a>'
              }

              if ( data.soundcloudTrackId ) {
                SC.get('/tracks/' + data.soundcloudTrackId)
                  .then(function(track) {
                    $el.html(
                      contributorName
                      + ': <a href="' + track.permalink_url
                      + '" target="_blank">' + data.file + '</a>'
                    )

                    $el.fadeIn(500)
                  });
              }
              else {
                $el.html(contributorName + ': ' + data.file);
                $el.fadeIn(500)
              }
            })
          })
        }
      };

      sock.onclose = function() {
        console.log('WS connection closed');
      };
    });
  </script>
</head>
